<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evergreen Pure Veg | Smart Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --evergreen: #2e7d32; --accent: #ef6c00; --bg: #f4f7f4; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); overflow-x: hidden; }

        /* HEADER ANIMATION */
        header {
            background: white; padding: 20px; text-align: center;
            border-bottom: 4px solid var(--evergreen);
            animation: slideDown 0.6s ease-out;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        .logo { color: var(--evergreen); font-weight: 700; font-size: 1.6rem; letter-spacing: 1px; }
        .veg-tag { color: #d63031; font-weight: bold; font-size: 0.7rem; border: 1px solid #d63031; padding: 2px 6px; display: inline-block; margin-top: 5px; }

        /* MENU CARDS ANIMATION */
        .menu-container { padding: 15px; display: grid; gap: 15px; padding-bottom: 100px; }

        .item-card {
            background: white; border-radius: 15px; display: flex; padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            opacity: 0; animation: fadeInUp 0.7s ease-out forwards;
            transition: transform 0.2s;
        }
        .item-card:active { transform: scale(0.96); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Staggered Delay for items */
        .item-card:nth-child(1) { animation-delay: 0.1s; }
        .item-card:nth-child(2) { animation-delay: 0.2s; }
        .item-card:nth-child(3) { animation-delay: 0.3s; }
        .item-card:nth-child(4) { animation-delay: 0.4s; }

        .item-img { width: 70px; height: 70px; background: #e8f5e9; border-radius: 12px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; color: #333; }
        .price { color: var(--evergreen); font-weight: 700; font-size: 1.1rem; margin-top: 4px; }

        .add-btn {
            background: var(--evergreen); color: white; border: none;
            padding: 10px 20px; border-radius: 25px; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }

        /* CART BUTTON ANIMATION */
        #cartFab {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: var(--evergreen); color: white; padding: 15px 35px;
            border-radius: 50px; font-weight: 700; box-shadow: 0 8px 25px rgba(46, 125, 50, 0.4);
            z-index: 1000;
        }
        .bounce { animation: bounce 0.4s ease; }
        @keyframes bounce { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.15); } }
    </style>
</head>
<body>

<header>
    <div class="logo">EVERGREEN</div>
    <div class="veg-tag">PURE VEGETARIAN SINCE 1978</div>
</header>

<div class="menu-container" id="menu"></div>

<div id="cartFab">
    <span>🛒 View Order (<span id="count">0</span>)</span>
</div>

<script>
    const items = [
        { id: 1, name: "Deluxe Thali", price: 18.00, icon: "🍱" },
        { id: 2, name: "Ghee Roast", price: 14.00, icon: "🥞" },
        { id: 3, name: "Masala Dosa", price: 13.00, icon: "🌯" },
        { id: 4, name: "Paneer 65", price: 18.00, icon: "🌶️" }
    ];

    function render() {
        const container = document.getElementById('menu');
        container.innerHTML = items.map(item => `
            <div class="item-card">
                <div class="item-img">${item.icon}</div>
                <div class="item-info">
                    <div class="item-name">${item.name}</div>
                    <div class="price">AED ${item.price.toFixed(2)}</div>
                </div>
                <button class="add-btn" onclick="add()">Add</button>
            </div>
        `).join('');
    }

    let count = 0;
    function add() {
        count++;
        document.getElementById('count').innerText = count;
        const fab = document.getElementById('cartFab');
        fab.classList.remove('bounce');
        void fab.offsetWidth; // Trigger reflow for animation
        fab.classList.add('bounce');
    }

    render();
</script>
</body>
</html>
